services:
  aqi-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: aqi-api:latest
    environment:
      - MODEL_NAME=AQI_Predictor
      - MODEL_STAGE=Production
      - MLFLOW_TRACKING_URI=http://mlflow-server:5000
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./mlruns:/app/mlruns
    networks:
      - aqi-network
    restart: unless-stopped
    deploy:
      replicas: 3

  mlflow-server:
    image: ghcr.io/mlflow/mlflow:v2.19.0
    container_name: mlflow-server
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    volumes:
      - mlflow-data:/mlflow
      - ./mlruns:/mlflow/mlruns
    networks:
      - aqi-network
    restart: unless-stopped

networks:
  aqi-network:
    driver: bridge

volumes:
  mlflow-data:
