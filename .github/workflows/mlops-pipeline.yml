name: MLOps Automation Pipeline

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  repository_dispatch:  # Trigger dari webhook
    types: [retrain]

jobs:
  mlops-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # ... (sama seperti workflow sebelumnya, ditambah evaluasi komparatif)
      - name: Run Training
        run: python src/train.py
      - name: Run Evaluation & Compare
        run: python src/evaluate.py  # sudah membandingkan MAE
      - name: Register Model (auto-promote if better)
        run: python src/register_model.py
      - name: Commit updated model
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add models/best_model.pkl data/processed/processed_data.csv
          git diff --staged --quiet || git commit -m "[automated] Retrain model due to alert"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}