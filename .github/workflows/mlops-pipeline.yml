name: MLOps Automation Pipeline

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */6 * * *'

jobs:
  mlops-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Create Directories
        run: mkdir -p models data/raw data/processed

      - name: Restore CSV from repo
        run: |
          if [ -f processed_data.csv ]; then
            cp processed_data.csv data/processed/processed_data.csv
            echo "✅ CSV restored"
          else
            echo "⚠️ No existing CSV"
          fi

      - name: Run Data Ingestion (limited)
        run: python src/ingest_data.py --max-pages 3
        continue-on-error: true

      - name: Run Preprocessing
        run: python src/preprocess.py

      - name: Run Training
        run: python src/train.py

      - name: Run Evaluation
        run: python src/evaluate.py
        continue-on-error: true

      - name: Register Model
        run: python src/register_model.py

      - name: Copy CSV to root
        run: cp data/processed/processed_data.csv processed_data.csv

      - name: Commit & Push
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add models/best_model.pkl processed_data.csv
          git diff --staged --quiet || git commit -m "[automated] Update model & data"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
