name: MLOps Automation Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 */6 * * *'

jobs:
  mlops-pipeline:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_USER: mlflow
          POSTGRES_PASSWORD: mlflow_password
          POSTGRES_DB: mlflowdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install psycopg2-binary sqlalchemy

      - name: Create Directories
        run: mkdir -p models data/raw data/processed

      - name: Run Data Ingestion
        run: python src/ingest_data.py
        env:
          POSTGRES_HOST: localhost

      - name: Run Unit Tests
        run: pytest tests/ --tb=short
        continue-on-error: true

      - name: Run Preprocessing
        run: python src/preprocess.py
        env:
          POSTGRES_HOST: localhost

      - name: Run Training Pipeline
        run: python src/train.py

      - name: Run Evaluation
        run: python src/evaluate.py
        continue-on-error: true

      - name: Register Model to MLflow
        run: python src/register_model.py

      - name: Copy CSV to root for deployment
        run: cp data/processed/processed_data.csv processed_data.csv

      - name: Commit & Push updated model & data
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add models/best_model.pkl processed_data.csv
          git diff --staged --quiet || git commit -m "[automated] Update model & data"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-and-data
          path: |
            models/best_model.pkl
            processed_data.csv
