global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - "/etc/prometheus/alert.rules.yml"

scrape_configs:
  - job_name: 'aqi-api'
    static_configs:
      - targets:
          - 'mlops-air_quality_prediction-aqi-api-1:8000'
          - 'mlops-air_quality_prediction-aqi-api-2:8000'
          - 'mlops-air_quality_prediction-aqi-api-3:8000'
    metrics_path: '/metrics'
    
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
